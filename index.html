<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Click Master Pro</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            transition: background-color 0.5s ease;
        }

        #ui-lista {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: rgba(42, 42, 42, 0.9);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: relative;
            z-index: 5;
        }

        #terc {
            position: absolute;
            background-color: #ff4757;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px #ff4757;
            z-index: 2;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 1;
        }

        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-okno {
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            max-width: 85%;
            width: 100%;
        }

        input[type="text"], select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 6px;
            background-color: #333;
            color: white;
            border: 1px solid #444;
            box-sizing: border-box;
        }

        button#start-tlacitko {
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 15px 0;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
        }

        .zebricek-radek {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>

    <div id="modal-overlay">
        <div class="modal-okno">
            <h2 style="color:#ff4757">🎯 Click Master Pro</h2>
            <p style="font-size: 14px; color: #aaa;">Trefuj terč a sleduj efekty!</p>
            
            <input type="text" id="jmeno-hrace" placeholder="Tvé jméno..." maxlength="12">
            
            <select id="volba-obtiznosti">
                <option value="80">Lehká</option>
                <option value="60" selected>Střední</option>
                <option value="40">Těžká</option>
            </select>

            <button id="start-tlacitko">START</button>

            <div id="zebricek" style="margin-top:20px; text-align:left;">
                <h4 style="margin:5px 0; text-align:center;">🏆 Síň slávy</h4>
                <div id="zebricek-data"></div>
            </div>
        </div>
    </div>

    <div id="ui-lista">
        <div id="profil-hrace">👤 <span id="zobrazene-jmeno">-</span></div>
        <div id="cas-box">⏳ <span id="cas">30</span>s</div>
        <div id="skore-box">🎯 <span id="skore">0</span></div>
    </div>

    <button id="terc"></button>

    <script>
        let skore = 0;
        let cas = 30;
        let velikostTerce = 60;
        let hraBezi = false;
        let casovac;
        let audioCtx = null;

        const terc = document.getElementById('terc');
        const skoreElement = document.getElementById('skore');
        const casElement = document.getElementById('cas');
        const modalOverlay = document.getElementById('modal-overlay');
        const startTlacitko = document.getElementById('start-tlacitko');
        const zobrazeneJmeno = document.getElementById('zobrazene-jmeno');

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function hrajZvuk(frekvence, typ, delka) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = typ;
            osc.frequency.setValueAtTime(frekvence, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delka);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delka);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + delka);
        }

        function vytvorCastice(x, y) {
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundColor = '#ff4757';
                p.style.width = Math.random() * 8 + 4 + 'px';
                p.style.height = p.style.width;
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                document.body.appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 4 + 2;
                let posX = x;
                let posY = y;
                let opacity = 1;

                const anim = setInterval(() => {
                    posX += Math.cos(angle) * velocity;
                    posY += Math.sin(angle) * velocity;
                    opacity -= 0.05;
                    p.style.left = posX + 'px';
                    p.style.top = posY + 'px';
                    p.style.opacity = opacity;
                    if (opacity <= 0) {
                        clearInterval(anim);
                        p.remove();
                    }
                }, 16);
            }
        }

        startTlacitko.addEventListener('click', () => {
            initAudio();
            const jmeno = document.getElementById('jmeno-hrace').value.trim() || "Hráč";
            velikostTerce = parseInt(document.getElementById('volba-obtiznosti').value);
            zobrazeneJmeno.textContent = jmeno;
            modalOverlay.style.display = 'none';
            terc.style.display = 'block';
            terc.style.width = velikostTerce + 'px';
            terc.style.height = velikostTerce + 'px';
            resetujHru();
        });

        function presunTerc() {
            const maxX = window.innerWidth - velikostTerce;
            const maxY = window.innerHeight - 150;
            terc.style.left = Math.random() * maxX + 'px';
            terc.style.top = (Math.random() * maxY + 80) + 'px';
        }

        function uder(e) {
            if (!hraBezi) { hraBezi = true; spustCasovac(); }
            skore++;
            skoreElement.textContent = skore;
            
            // Efekty
            const rect = terc.getBoundingClientRect();
            vytvorCastice(rect.left + velikostTerce/2, rect.top + velikostTerce/2);
            hrajZvuk(440 + (skore * 10), 'sine', 0.1);
            
            // Dynamické pozadí
            document.body.style.backgroundColor = `hsl(${skore * 5}, 30%, 15%)`;
            
            presunTerc();
        }

        function spustCasovac() {
            casovac = setInterval(() => {
                cas--;
                casElement.textContent = cas;
                if (cas <= 0) {
                    clearInterval(casovac);
                    hraBezi = false;
                    hrajZvuk(150, 'sawtooth', 0.5);
                    alert("Konec! Skóre: " + skore);
                    modalOverlay.style.display = 'flex';
                    terc.style.display = 'none';
                    document.body.style.backgroundColor = '#1a1a1a';
                }
            }, 1000);
        }

        function resetujHru() {
            skore = 0; cas = 30;
            skoreElement.textContent = skore;
            casElement.textContent = cas;
            presunTerc();
        }

        terc.addEventListener('touchstart', (e) => { e.preventDefault(); uder(); });
        terc.addEventListener('click', uder);
    </script>
</body>
</html>
