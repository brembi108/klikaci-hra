<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <!-- UPRAVENO pro mobily: Zakázali jsme uživatelské zoomování při rychlém klikání -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moje mobilní Vibe Coding Hra</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none; /* Pro Safari na iPhone */
            touch-action: manipulation; /* Optimalizace pro rychlé dotyky */
        }

        #ui-lista {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: #2a2a2a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .nastaveni-box {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }

        #vyber-barvy {
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        #terc {
            position: absolute;
            background-color: #ff4757;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px #ff4757;
            transition: transform 0.05s, background-color 0.2s;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }

        /* Na mobilu nechceme hover efekt (nemáme myš), stačí aktivní stisk */
        #terc:active {
            transform: scale(0.85) translate(-50%, -50%);
        }

        /* Úvodní okno přizpůsobené pro mobily */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-okno {
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 85%;
            width: 100%;
        }

        .modal-okno h2 {
            margin-top: 0;
            color: #ff4757;
            font-size: 22px;
        }

        .sekce-nastaveni {
            text-align: left;
            margin-bottom: 12px;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
        }

        .sekce-nastaveni label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #ccc;
            font-size: 13px;
        }

        .modal-okno input[type="text"], .modal-okno select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #444;
            border-radius: 6px;
            background-color: #2a2a2a;
            color: white;
            box-sizing: border-box;
        }

        .modal-okno button#start-tlacitko {
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 12px 0;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
        }

        #zebricek {
            margin-top: 15px;
            text-align: left;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
            max-height: 120px;
            overflow-y: auto;
        }

        #zebricek h3 {
            margin-top: 0;
            text-align: center;
            font-size: 14px;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
        }

        .zebricek-radek {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div id="modal-overlay">
        <div class="modal-okno">
            <h2>⚙️ Nastavení hry</h2>
            
            <div class="sekce-nastaveni">
                <label for="jmeno-hrace">Jméno hráče:</label>
                <input type="text" id="jmeno-hrace" placeholder="Tvoje jméno..." maxlength="15">
            </div>

            <div class="sekce-nastaveni">
                <label for="volba-casu">Délka hry (sekundy):</label>
                <select id="volba-casu">
                    <option value="10">10 sekund</option>
                    <option value="20">20 sekund</option>
                    <option value="30" selected>30 sekund</option>
                </select>
            </div>

            <div class="sekce-nastaveni">
                <label for="volba-obtiznosti">Obtížnost:</label>
                <select id="volba-obtiznosti">
                    <option value="90">Lehká (Velký terč)</option>
                    <option value="65" selected>Střední (Normální)</option>
                    <option value="45">Těžká (Malý terč)</option>
                </select>
            </div>

            <button id="start-tlacitko">Odstartovat hru</button>

            <div id="zebricek">
                <h3>🏆 Síň slávy</h3>
                <div id="zebricek-data"></div>
            </div>
        </div>
    </div>

    <div id="ui-lista">
        <div id="profil-hrace"><span id="zobrazene-jmeno">-</span></div>
        <div id="cas-box">⏳ <span id="cas">30</span>s</div>
        <div class="nastaveni-box">
            <input type="color" id="vyber-barvy" value="#ff4757">
        </div>
        <div id="skore-box">🎯 <span id="skore">0</span></div>
    </div>

    <button id="terc"></button>

    <script>
        let skore = 0;
        let cas = 30;
        let maximalniCas = 30;
        let velikostTerce = 65;
        let hraBezi = false;
        let casovac;
        let jmeno = "";

        const terc = document.getElementById('terc');
        const skoreElement = document.getElementById('skore');
        const casElement = document.getElementById('cas');
        const vyberBarvy = document.getElementById('vyber-barvy');
        
        const modalOverlay = document.getElementById('modal-overlay');
        const jmenoInput = document.getElementById('jmeno-hrace');
        const volbaCasu = document.getElementById('volba-casu');
        const volbaObtiznosti = document.getElementById('volba-obtiznosti');
        const startTlacitko = document.getElementById('start-tlacitko');
        const zobrazeneJmeno = document.getElementById('zobrazene-jmeno');
        const zebricekData = document.getElementById('zebricek-data');

        vykresliZebricek();

        startTlacitko.addEventListener('click', () => {
            jmeno = jmenoInput.value.trim();
            if (jmeno === "") {
                alert("Zadej jméno!");
                return;
            }

            maximalniCas = parseInt(volbaCasu.value);
            velikostTerce = parseInt(volbaObtiznosti.value);

            terc.style.width = velikostTerce + 'px';
            terc.style.height = velikostTerce + 'px';

            zobrazeneJmeno.textContent = jmeno;
            modalOverlay.style.display = 'none';
            terc.style.display = 'block';
            resetujHru();
        });

        vyberBarvy.addEventListener('input', (udalost) => {
            const zvolekaBarva = udalost.target.value;
            terc.style.backgroundColor = zvolekaBarva;
            terc.style.boxShadow = `0 0 15px ${zvolekaBarva}`;
        });

        function presunTerc() {
            const sirkaOkna = window.innerWidth;
            const vyskaOkna = window.innerHeight;

            const maximalniX = sirkaOkna - velikostTerce;
            // Zvýšená rezerva dole, aby tlačítko neskákalo pod softwarová tlačítka mobilu
            const maximalniY = vyskaOkna - (160 + velikostTerce);

            const nahodneX = Math.floor(Math.random() * maximalniX);
            const nahodneY = Math.floor(Math.random() * maximalniY) + 70;

            terc.style.left = nahodneX + 'px';
            terc.style.top = nahodneY + 'px';
            terc.style.transform = 'none';
        }

        function spustCasovac() {
            casovac = setInterval(() => {
                cas--;
                casElement.textContent = cas;

                if (cas === 0) {
                    clearInterval(casovac);
                    hraBezi = false;
                    alert(`Konec hry, ${jmeno}! Skóre: ${skore}`);
                    ulozSkore(jmeno, skore);
                    
                    vykresliZebricek();
                    terc.style.display = 'none';
                    modalOverlay.style.display = 'flex';
                }
            }, 1000);
        }

        function resetujHru() {
            skore = 0;
            cas = maximalniCas;
            skoreElement.textContent = skore;
            casElement.textContent = cas;
            terc.style.left = '50%';
            terc.style.top = '50%';
            terc.style.transform = 'translate(-50%, -50%)';
        }

        // UPRAVENO pro mobily: Reaguje okamžitě na dotyk (touchstart) i kliknutí
        const uder = () => {
            if (!hraBezi) {
                hraBezi = true;
                spustCasovac();
            }

            skore++;
            skoreElement.textContent = skore;
            presunTerc();
        };

        terc.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Zabrání zdvojenému kliknutí na mobilu
            uder();
        });
        terc.addEventListener('click', uder);

        function ulozSkore(hracJmeno, hracSkore) {
            let historie = JSON.parse(localStorage.getItem('vibeHraZebricek')) || [];
            historie.push({ jmeno: hracJmeno, skore: hracSkore });
            historie.sort((a, b) => b.skore - a.skore);
            historie = historie.slice(0, 5);
            localStorage.setItem('vibeHraZebricek', JSON.stringify(historie));
        }

        function vykresliZebricek() {
            const historie = JSON.parse(localStorage.getItem('vibeHraZebricek')) || [];
            if (historie.length === 0) {
                zebricekData.innerHTML = '<div style="text-align:center;color:#666;">Zatím žádné výsledky</div>';
                return;
            }

            zebricekData.innerHTML = historie.map((polozka, index) => `
                <div class="zebricek-radek">
                    <span>${index + 1}. ${polozka.jmeno}</span>
                    <strong>${polozka.skore} b.</strong>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
