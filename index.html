<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moje mobilní Vibe Coding Hra</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* Výchozí barva */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            transition: background-color 0.5s ease; /* Plynulá změna barvy pozadí */
        }

        #ui-lista {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: rgba(42, 42, 42, 0.9);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: relative;
            z-index: 5;
        }

        #terc {
            position: absolute;
            background-color: #ff4757;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px #ff4757;
            transition: transform 0.05s;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }

        #terc:active {
            transform: scale(0.85) translate(-50%, -50%);
        }

        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-okno {
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 85%;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .sekce-manual {
            background: #333;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
            border-left: 4px solid #2ed573;
        }

        .sekce-manual h3 {
            margin-top: 0;
            color: #2ed573;
            font-size: 16px;
        }

        .sekce-manual p {
            font-size: 14px;
            line-height: 1.4;
            margin: 5px 0;
        }

        .sekce-nastaveni {
            text-align: left;
            margin-bottom: 12px;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
        }

        .sekce-nastaveni label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #ccc;
            font-size: 13px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #444;
            border-radius: 6px;
            background-color: #2a2a2a;
            color: white;
            box-sizing: border-box;
        }

        button#start-tlacitko {
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 15px 0;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        #zebricek {
            margin-top: 15px;
            text-align: left;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
        }

        .zebricek-radek {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div id="modal-overlay">
        <div class="modal-okno">
            <h2 style="color:#ff4757">🎯 Click Master</h2>
            
            <div class="sekce-manual">
                <h3>📖 Jak hrát?</h3>
                <p>1. Zadej své jméno a vyber si obtížnost.</p>
                <p>2. Po kliknutí na tlačítko Start se objeví terč.</p>
                <p>3. <strong>Tvůj úkol:</strong> Klikni na terč tolikrát, kolikrát to stihneš v časovém limitu.</p>
                <p>4. Čím vyšší skóre, tím více se bude měnit barva okolí!</p>
            </div>

            <div class="sekce-nastaveni">
                <label for="jmeno-hrace">Tvé jméno:</label>
                <input type="text" id="jmeno-hrace" placeholder="Hráč..." maxlength="15">
            </div>

            <div class="sekce-nastaveni">
                <label for="volba-obtiznosti">Obtížnost:</label>
                <select id="volba-obtiznosti">
                    <option value="90">Lehká (Velký terč)</option>
                    <option value="65" selected>Střední (Normální)</option>
                    <option value="40">Těžká (Malý terč)</option>
                </select>
            </div>

            <button id="start-tlacitko">SPUSTIT HRU</button>

            <div id="zebricek">
                <h3 style="margin-top:0; font-size:14px; text-align:center;">🏆 Nejlepší výsledky</h3>
                <div id="zebricek-data"></div>
            </div>
        </div>
    </div>

    <div id="ui-lista">
        <div id="profil-hrace"><span id="zobrazene-jmeno">-</span></div>
        <div id="cas-box">⏳ <span id="cas">30</span>s</div>
        <div id="skore-box">🎯 <span id="skore">0</span></div>
    </div>

    <button id="terc"></button>

    <script>
        let skore = 0;
        let cas = 30;
        let velikostTerce = 65;
        let hraBezi = false;
        let casovac;
        let jmeno = "";

        const terc = document.getElementById('terc');
        const skoreElement = document.getElementById('skore');
        const casElement = document.getElementById('cas');
        const modalOverlay = document.getElementById('modal-overlay');
        const startTlacitko = document.getElementById('start-tlacitko');
        const zobrazeneJmeno = document.getElementById('zobrazene-jmeno');

        vykresliZebricek();

        startTlacitko.addEventListener('click', () => {
            jmeno = document.getElementById('jmeno-hrace').value.trim() || "Anonym";
            velikostTerce = parseInt(document.getElementById('volba-obtiznosti').value);
            
            terc.style.width = velikostTerce + 'px';
            terc.style.height = velikostTerce + 'px';
            zobrazeneJmeno.textContent = jmeno;
            modalOverlay.style.display = 'none';
            terc.style.display = 'block';
            resetujHru();
        });

        function aktualizujPozadi() {
            // Skóre 0-50 změní odstín pozadí od tmavé do modro-fialové
            const intenzita = Math.min(skore * 5, 150); 
            document.body.style.backgroundColor = `rgb(26, ${intenzita / 2}, ${intenzita})`;
        }

        function presunTerc() {
            const sirkaOkna = window.innerWidth;
            const vyskaOkna = window.innerHeight;
            const maximalniX = sirkaOkna - velikostTerce;
            const maximalniY = vyskaOkna - (100 + velikostTerce);

            const nahodneX = Math.floor(Math.random() * maximalniX);
            const nahodneY = Math.floor(Math.random() * maximalniY) + 70;

            terc.style.left = nahodneX + 'px';
            terc.style.top = nahodneY + 'px';
            terc.style.transform = 'none';
        }

        function spustCasovac() {
            casovac = setInterval(() => {
                cas--;
                casElement.textContent = cas;
                if (cas === 0) {
                    clearInterval(casovac);
                    hraBezi = false;
                    alert(`Čas vypršel! Skóre: ${skore}`);
                    ulozSkore(jmeno, skore);
                    vykresliZebricek();
                    terc.style.display = 'none';
                    modalOverlay.style.display = 'flex';
                    document.body.style.backgroundColor = '#1a1a1a'; // Reset barvy
                }
            }, 1000);
        }

        function resetujHru() {
            skore = 0;
            cas = 30;
            skoreElement.textContent = skore;
            casElement.textContent = cas;
            document.body.style.backgroundColor = '#1a1a1a';
            presunTerc();
        }

        const uder = () => {
            if (!hraBezi) {
                hraBezi = true;
                spustCasovac();
            }
            skore++;
            skoreElement.textContent = skore;
            aktualizujPozadi();
            presunTerc();
        };

        terc.addEventListener('touchstart', (e) => { e.preventDefault(); uder(); });
        terc.addEventListener('click', uder);

        function ulozSkore(hracJmeno, hracSkore) {
            let historie = JSON.parse(localStorage.getItem('vibeHraZebricek')) || [];
            historie.push({ jmeno: hracJmeno, skore: hracSkore });
            historie.sort((a, b) => b.skore - a.skore);
            localStorage.setItem('vibeHraZebricek', JSON.stringify(historie.slice(0, 5)));
        }

        function vykresliZebricek() {
            const historie = JSON.parse(localStorage.getItem('vibeHraZebricek')) || [];
            document.getElementById('zebricek-data').innerHTML = historie.map((p, i) => `
                <div class="zebricek-radek">
                    <span>${i + 1}. ${p.jmeno}</span>
                    <strong>${p.skore} b.</strong>
                </div>
            `).join('') || '<div style="text-align:center;color:#666;">Zatím prázdno</div>';
        }
    </script>
</body>
</html>
